<!doctype html>
<html>
<head>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: #f4f4f9; }
        header { background: #2c3e50; color: #ecf0f1; padding: 20px; text-align: center; }
        .hero { padding: 40px; background: #3498db; color: white; text-align: center; }
        .container { padding: 20px; max-width: 800px; margin: auto; }
        
        /* Gallery Style */
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .gallery img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; border: 3px solid #fff; }
        
        /* Contact Style */
        .contact { background: #ecf0f1; padding: 20px; border-radius: 8px; margin-top: 30px; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #27ae60; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; }
        
        .footer { background: #2c3e50; color: white; text-align: center; padding: 10px; margin-top: 20px; }
    </style>
</head>
<body>

    <header>
        <h1>King Sale-Amlak</h1>
    </header>

    <div class="hero">
        <h2>እንኳን ደህና መጡ!</h2>
        <p>ፈጠራ እና ቴክኖሎጂን የሚያገናኝ ድረ-ገጽ።</p>
    </div>

    <div class="container">
        <h3>የእኔ ጋለሪ</h3>
        <div class="gallery">
            <img src="https://via.placeholder.com/200" alt="Work 1">
            <img src="https://via.placeholder.com/200" alt="Work 2">
            <img src="https://via.placeholder.com/200" alt="Work 3">
        </div>

        <div class="contact">
            <h3>Contact (አግኙኝ)</h3>
            <input type="text" placeholder="ስምዎ">
            <input type="email" placeholder="ኢሜይልዎ">
            <textarea placeholder="መልእክትዎ"></textarea>
            <button>ላክ</button>
        </div>
    </div>

    <div class="footer">
        <p>© 2026 King Sale-Amlak | ሁሉም መብት የተጠበቀ ነው</p>
    </div>

</body>
</html>
