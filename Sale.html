<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: rgb(30, 30, 30);
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

    <canvas id="myCanvas"></canvas>

    <script>
        // --- 1. INITIALIZATION FROM ORIGINAL CODE ---
        function init(elemid) {
            let canvas = document.getElementById(elemid),
                c = canvas.getContext("2d"),
                w = (canvas.width = window.innerWidth),
                h = (canvas.height = window.innerHeight);
            
            // Initial dark fill
            c.fillStyle = "rgba(30,30,30,1)";
            c.fillRect(0, 0, w, h);
            
            return { c: c, canvas: canvas, w: w, h: h };
        }

        // Setup canvas
        const setup = init("myCanvas");
        const ctx = setup.c;
        const width = setup.w;
        const height = setup.h;

        // --- 2. PARTICLE SYSTEM CODE (FOR CHAOTIC MOVEMENT) ---
        const particles = [];
        const particleCount = 200; // The number of 'many small things'

        // Particle Class definition
        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 3 + 1; // Small size
                // Velocity (speed) - creating chaotic movement
                this.speedX = Math.random() * 6 - 3; // Random speed -3 to 3
                this.speedY = Math.random() * 6 - 3; // Random speed -3 to 3
                // Random white/grey colors
                const colorValue = Math.floor(Math.random() * 155 + 100); 
                this.color = `rgba(${colorValue}, ${colorValue}, ${colorValue}, ${Math.random()})`;
            }

            // Update particle position
            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                // Bounce off edges
                if (this.x > width || this.x < 0) {
                    this.speedX = -this.speedX;
                }
                if (this.y > height || this.y < 0) {
                    this.speedY = -this.speedY;
                }
            }

            // Draw the particle
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Create the particles
        function createParticles() {
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        // --- 3. ANIMATION LOOP ---
        function animate() {
            // Clear the canvas slightly each frame for trails
            ctx.fillStyle = "rgba(30, 30, 30, 0.2)";
            ctx.fillRect(0, 0, width, height);

            // Update and draw all particles
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }

            // Call animate again on the next frame
            requestAnimationFrame(animate);
        }

        // Start everything
        createParticles();
        animate();

        // Handle window resizing
        window.addEventListener('resize', function() {
            init("myCanvas"); // Re-init on resize
            particles.length = 0; // Clear array
            createParticles(); // Re-create particles
        });

    </script>
</body>
</html>
