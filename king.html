<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>King Sale-Amlak Official</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background-color: #f4f4f9; }
        header { background: #2c3e50; color: #ecf0f1; padding: 20px; text-align: center; }
        .hero { padding: 50px 20px; background: #3498db; color: white; text-align: center; }
        .container { padding: 20px; max-width: 800px; margin: auto; }
        
        /* Gallery */
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .gallery img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; border: 3px solid #fff; }
        
        /* Contact Form */
        .contact { background: #ffffff; padding: 25px; border-radius: 8px; margin-top: 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #27ae60; color: white; border: none; padding: 12px 25px; cursor: pointer; border-radius: 4px; font-size: 16px; }
        button:hover { background: #219150; }
        
        .footer { background: #2c3e50; color: white; text-align: center; padding: 15px; margin-top: 40px; }
    </style>
</head>
<body>

    <header>
        <h1>King Sale-Amlak</h1>
    </header>

    <div class="hero">
        <h2>Welcome to my official website!</h2>
        <p>Showcasing creativity, technology, and innovation.</p>
    </div>

    <div class="container">
        <h3>My Gallery</h3>
        <div class="gallery">
            <img src="https://via.placeholder.com/300" alt="Work 1">
            <img src="https://via.placeholder.com/300" alt="Work 2">
            <img src="https://via.placeholder.com/300" alt="Work 3">
        </div>

        <div class="contact">
            <h3>Contact Me</h3>
            <input type="text" placeholder="Your Name">
            <input type="email" placeholder="Your Email">
            <textarea placeholder="Your Message"></textarea>
            <button type="submit">Send Message</button>
        </div>
    </div>

    <div class="footer">
        <p>&copy; 2026 King Sale-Amlak. All Rights Reserved.</p>
    </div>

</body>
</html>
